# checkout_values.yaml
metric_name: "checkout_flow_errors"
namespace: "billing-prod"
runbook_url: "https://wiki.example.com/runbooks/checkout-alerts"

# Labels that will be added to the generated alerts
rule_labels:
  team: payments
  tier: critical

# Metadata labels for the PrometheusRule resource itself
meta_labels:
  name: checkout-slo-alerts
  role: alert-rules
